<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Supplier Entry</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
<img class="logo" <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSlCdkKV6D1Lcop7bCVUaPMNR8NEzyBBBi6hgF3NlatKH2IsRdiFi1C1aBO&s=10">
<div>
<h1>HAL Inventory System</h1>
<p>Supplier Management</p>
</div>
</div>

<div class="nav"><a href="dashboard.html">Dashboard</a></div>

<div class="container">
<h2>Supplier Entry</h2>

<div id="msg"></div>

<form id="supplierForm">
<label>Supplier ID</label>
<input type="text" name="id" required>

<label>Supplier Name</label>
<input type="text" name="name" required>

<label>Contact Number</label>
<input type="text" name="contact" required>

<label>Address</label>
<input type="text" name="address" required>

<button type="submit">Save Supplier</button>
</form>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
requireLogin();

document.getElementById("supplierForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const f = e.target;
  const msg = document.getElementById("msg");
  msg.innerHTML = "";
  try {
    await apiCall("/suppliers.php", {
      method: "POST",
      body: { id: f.id.value, name: f.name.value, contact: f.contact.value, address: f.address.value },
    });
    window.location.href = "supplier_view.html";
  } catch (err) {
    msg.innerHTML = `<div class="error">${err.message}</div>`;
  }
});
</script>

</body>
</html>
