*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f4f6f9;
    font-family:Arial, Helvetica, sans-serif;
}

.container{
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

.hal-logo{
    width:350px;
    height:auto;
    margin-bottom:20px;
}

h1{
    color:#005BAC;
    font-size:28px;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:18px;
}
